services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    user: "${UID}:${GID}"
    volumes:
      - .:/var/www/html
    networks:
      - tabresolve
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    user: "${UID}:${GID}"
    volumes:
      - .:/var/www/html
    networks:
      - tabresolve
    depends_on:
      redis:
        condition: service_healthy
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "${FORWARD_REVERB_PORT:-8081}:8080"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    user: "${UID}:${GID}"
    volumes:
      - .:/var/www/html
    networks:
      - tabresolve
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # queue:listen (not queue:work) reboots the framework per job, so changes to
    # Job classes are picked up without restarting the container in dev.
    command: php artisan queue:listen redis --tries=3 --timeout=120

  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    user: "${UID}:${GID}"
    volumes:
      - .:/var/www/html
    networks:
      - tabresolve
    # Install deps inside the container (host Node is too old for Vite 8), then
    # start the dev server with HMR. Writes public/hot so Laravel serves assets
    # from here instead of the built manifest.
    command: sh -c "[ -d node_modules ] || npm install; npm run dev"
    ports:
      - "${FORWARD_VITE_PORT:-5173}:5173"

  nginx:
    image: nginx:alpine
    ports:
      - "${FORWARD_APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tabresolve
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    ports:
      - "${FORWARD_DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tabresolve
      MYSQL_USER: tabresolve
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tabresolve
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-6380}:6379"
    networks:
      - tabresolve
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  tabresolve:
    driver: bridge

volumes:
  mysql_data:
