server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # .webmanifest is not in nginx's default mime.types — serve it correctly.
    location = /site.webmanifest {
        default_type application/manifest+json;
    }

    location ~ \.php$ {
        # Resolve the `app` upstream at request time via Docker's embedded DNS
        # (127.0.0.11). Without this, nginx caches the container IP at startup and
        # 502s after `app` is recreated on a rebuild — forcing a manual nginx
        # restart. The $upstream variable defers resolution to each request.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
